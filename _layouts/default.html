<!doctype html>
<html lang="zh-CN">
  <head>
    {% include head.html %}
  </head>
  <body>
    <div class="site">
      {% include header.html %}
      <a class="skip-link" href="#content">跳到内容</a>
      <main id="content" class="container main" role="main">
        {% if page.layout != 'post' %}
          <h1 class="page-title">{{ page.title }}</h1>
        {% endif %}
        <div class="content">
          {{ content }}
        </div>
      </main>
      {% include footer.html %}
    </div>
    <script src="{{ '/assets/js/search.js' | relative_url }}" defer></script>
  </body>
</html>
